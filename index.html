<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SaaSNova Agent Team Demos</title>
  <style>
    :root {
      --ink: #161e2e;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #f5f3ee;
      --panel: #ffffff;
      --teal: #0f8a83;
      --blue: #315dba;
      --aws: #ff9900;
      --purple: #6941c6;
      --shadow: 0 18px 48px rgba(22, 30, 46, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(rgba(22, 30, 46, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22, 30, 46, .035) 1px, transparent 1px),
        var(--paper);
      background-size: 42px 42px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 36px 22px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 22px;
      border-bottom: 1px solid rgba(22, 30, 46, .13);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .brand strong {
      display: block;
      font-size: 16px;
    }

    .brand span,
    .status {
      color: var(--muted);
      font-size: 13px;
    }

    .intro {
      padding: 42px 0 24px;
      max-width: 780px;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 6vw, 68px);
      line-height: .96;
      letter-spacing: 0;
    }

    .intro p {
      margin: 18px 0 0;
      color: #475467;
      font-size: 18px;
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 16px;
    }

    .card {
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
